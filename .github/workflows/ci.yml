name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run all tests
        run: pytest tests/ -v --tb=short

      - name: Check coverage
        run: pytest tests/unit/ tests/e2e/ --cov=slopenav --cov-report=term-missing --cov-fail-under=85

      - name: Run property tests
        run: pytest tests/property/ -v --tb=short || echo "Property tests (optional)"

  benchmark:
    name: Synthetic benchmark (¥0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Run P0 + P1 synthetic experiments
        run: python benchmarks/2026-05-sn-synthetic/run_sn_p0_p1.py
        working-directory: .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: mypy src/slopenav --ignore-missing-imports --strict-optional
