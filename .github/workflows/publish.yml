name: Publish to PyPI

# Trusted Publisher — see https://docs.pypi.org/trusted-publishers/
#
# Setup (one-time, on pypi.org):
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new pending publisher:
#        PyPI Project Name: slopenav
#        Owner:             yoligehude14753
#        Repository name:   slopenav
#        Workflow name:     publish.yml
#        Environment name:  pypi
#   3. After the first successful publish, PyPI converts this into a "trusted publisher"
#      that requires no API token at all on subsequent runs.
#
# Trigger: pushing a tag like v0.1.0 or v0.2.3 publishes the matching wheel to PyPI.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/slopenav
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJ=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG" != "$PROJ" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PROJ"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
